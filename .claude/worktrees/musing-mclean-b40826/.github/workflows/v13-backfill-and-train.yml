name: v13 BL Safeguard Backfill & Training

# Manual trigger for v13 BL safeguard feature backfill and model training.
# This workflow:
#   1. Backfills 3 BL safeguard features into prediction_logs (4-year history)
#   2. Trains v13 model with the new features
#   3. Commits updated v13 model files
#
# The 3 features fix the April 15 BL spike miss by contextualizing BL height:
#   - entrainment_temp_diff: 925mb temperature gradient (entrainment signal)
#   - marine_containment: normalized coastal gradient / mixing depth
#   - inland_strength: inland station bias vs model consensus
#
# Run manually: Actions tab → v13 BL Safeguard Backfill & Training → Run workflow

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill-and-train-v13:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.24.3 pandas==2.2.3 scikit-learn==1.3.0 requests beautifulsoup4 pytz supabase python-dotenv

      - name: Backfill v13 features (dry-run)
        run: |
          echo "=== Verifying test cases before commit ==="
          python backfill_v13_features.py --dry-run

      - name: Backfill v13 features (commit to Supabase)
        run: |
          echo "=== Populating 3 BL safeguard features for 4-year history ==="
          python backfill_v13_features.py
          echo "✅ Backfill complete: entrainment_temp_diff, marine_containment, inland_strength"

      - name: Train v13 model (NYC)
        run: |
          echo "=== Training v13 HistGradientBoostingRegressor on 160 features (NYC) ==="
          python train_models.py --city nyc --v13
          echo "✅ NYC v13 training complete"

      - name: Backfill v13 features (LAX)
        run: |
          echo "=== Populating 3 BL safeguard features for LAX history ==="
          python backfill_v13_features.py --city lax
          echo "✅ LAX backfill complete: entrainment_temp_diff, marine_containment, inland_strength"

      - name: Train v13 model (LAX)
        run: |
          echo "=== Training v13 HistGradientBoostingRegressor on 160 features (LAX) ==="
          python train_models.py --city lax --v13
          echo "✅ LAX v13 training complete"

      - name: Verify model files
        run: |
          ls -lh bcp_v13_*.pkl model_metadata_v13.json 2>/dev/null || echo "Checking files..."
          echo "NYC and LAX v13 models trained and ready"

      - name: Commit updated v13 model files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bcp_v13_*.pkl model_metadata_v13.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No v13 model changes detected."
          else
            git commit -m "Train v13 BL safeguard models (NYC + LAX) with backfilled features"
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed; aborting"; git rebase --abort || true; exit 0; }
            git push origin HEAD:main || true
          fi
