name: Nightly Lightweight Retrain (post-00Z)

# Runs at 1 AM EDT / 05:00 UTC — after:
#   ✅  Today's actual high is scored (~8-9pm EDT)
#   ✅  00Z HRRR model output propagates through APIs (~10-11pm EDT)
#   ✅  overnight-d1.yml has ingested 00Z data (midnight EDT run)
#
# This is a LIGHTWEIGHT retrain — skips all backfill steps and just
# re-runs train_models.py so the model picks up today's newly scored row
# before overnight D+1 predictions serve it to users.
#
# The FULL retrain (with all backfill) continues to run at 6am ET daily
# via retrain-model.yml, which is the canonical primary retrain.
#
# Why 1am?  At 11pm the 00Z HRRR hasn't fully propagated yet.
# At midnight the overnight-d1 job is still running.
# At 1am everything is settled: scored row is in DB, 00Z data is in,
# and overnight D+1 predictions already reflect the latest models.

on:
  schedule:
    - cron: "0 5 * * *"   # 1:00 AM EDT / 05:00 UTC daily
  workflow_dispatch: {}   # manual trigger for testing

permissions:
  contents: write

concurrency:
  group: nightly-lightweight-retrain
  cancel-in-progress: true

jobs:
  retrain-lightweight:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE:     ${{ secrets.SUPABASE_SERVICE_ROLE }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
      SYNOPTIC_TOKEN:            ${{ secrets.SYNOPTIC_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.24.3 pandas==2.2.3 scikit-learn==1.3.0 requests beautifulsoup4 pytz supabase python-dotenv

      - name: Verify Supabase schema (preflight)
        run: python verify_supabase_schema.py

      # Update heating windows based on latest observation data
      - name: Update heating windows (learns from new observations)
        run: |
          python update_heating_windows.py
        continue-on-error: true

      # Lightweight: only re-run train_models.py — no backfill.
      # HistGradientBoosting handles NaN natively so new/missing rows are fine.
      - name: Retrain v1–v8 (core models)
        run: |
          python train_models.py --all
          python train_models.py --all --v2
          python train_models.py --all --v4
          python train_models.py --all --v5
          python train_models.py --all --v6
          python train_models.py --all --v7
          python train_models.py --all --v8

      - name: Retrain v9–v15 (station + gradient + BL safeguard + blind-spot + morning/autoreg features — skip if insufficient rows)
        run: |
          python train_models.py --all --v9
          python train_models.py --all --v10
          python train_models.py --all --v11
          python train_models.py --all --v12
          python train_models.py --all --v13
          python train_models.py --all --v14
          python train_models.py --all --v15
        continue-on-error: true

      - name: Coverage regression guard
        run: python check_coverage_regression.py

      - name: Commit updated model files and heating windows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pkl *model_metadata*.json *coverage_report.json heating_windows.py 2>/dev/null || true
          # Stage deletions of tracked .pkl/metadata when the airtight gate
          # skips a version (see train_models.py _gate_and_filter_for_version).
          git add -u '*.pkl' '*model_metadata*.json' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — models and heating windows unchanged since last run."
          else
            git commit -m "Nightly lightweight retrain + heating window update $(date +%Y-%m-%d)

          Lightweight retrain at 1am EDT: picks up today's scored row before
          overnight D+1 predictions. Skips backfill (runs at 6am full retrain).

          Heating window updater: analyzes latest observation data and updates
          season-aware heating windows for NYC and LAX based on actual atmospheric
          patterns. Windows evolve as more data is collected."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed; aborting"; git rebase --abort || true; exit 0; }
            git push origin HEAD:main || true
          fi
