name: Weekly ML Model Retrain

on:
  schedule:
    # Every Monday at 6am ET (11am UTC)
    - cron: "0 11 * * 1"
  workflow_dispatch:  # manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.24.3 pandas scikit-learn==1.3.0 requests beautifulsoup4 pytz

      - name: Run model training (all cities)
        run: python train_models.py --all

      - name: Show training results
        run: |
          for prefix in "" "lax_"; do
            meta="${prefix}model_metadata.json"
            if [ -f "$meta" ]; then
              echo "=== ${prefix:-nyc_}Model Metadata ==="
              cat "$meta"
              echo ""
            fi
          done
          echo "=== Model files ==="
          ls -lh *model*.pkl *model_metadata*.json 2>/dev/null || echo "No model files"

      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *temp_model.pkl *bucket_model.pkl *model_metadata.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "Retrain ML models with latest data ($(date +%Y-%m-%d))

          Automated weekly retrain using train_models.py --all.
          Cities with <60 days of data are skipped automatically.
          See model_metadata.json for updated performance metrics."
            git push
          fi
