name: Daily ML Model Retrain

on:
  schedule:
    # Every day at 6am ET (10am UTC) — after finalize-yesterday (5am ET)
    # and before first prediction run (7am ET)
    - cron: "0 10 * * *"
  workflow_dispatch:  # manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE:     ${{ secrets.SUPABASE_SERVICE_ROLE }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE }}
      SYNOPTIC_TOKEN:            ${{ secrets.SYNOPTIC_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.24.3 pandas==2.2.3 scikit-learn==1.3.0 requests beautifulsoup4 pytz supabase python-dotenv

      - name: Backfill atmospheric data through yesterday
        run: |
          YESTERDAY=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)
          echo "Backfilling atmospheric data through $YESTERDAY"
          python backfill_multiyear.py --all --end "$YESTERDAY"

      - name: Backfill real NWS observation features (Supabase — recent 14 days)
        run: |
          python prediction_writer.py --city nyc backfill_obs
          python prediction_writer.py --city lax backfill_obs
        continue-on-error: true

      - name: Backfill historical obs from IEM ASOS (NYC JFK/LGA/Central Park, 2022–today)
        run: |
          python prediction_writer.py --city nyc backfill_obs_historical
        continue-on-error: true

      - name: Patch live-API columns (HRRR, 925mb, solar — past 90 days)
        run: |
          python backfill_multiyear.py --all --patch-live-cols
        continue-on-error: true

      - name: Backfill current-season atmospheric data (NWS-logged days)
        run: |
          python backfill_atmospheric.py --all
        continue-on-error: true

      - name: Backfill Synoptic named-station features (v9 — past 7 days)
        # Fills obs_kjfk_temp, obs_coastal_vs_inland, obs_kjfk_vs_knyc etc.
        # into any atm_snapshot rows written in the last 7 days that are missing them.
        # The nightly synoptic-backfill.yml handles this for yesterday specifically;
        # this step is a safety net so retrain always has fresh station data.
        run: |
          python backfill_synoptic.py --days 7
        continue-on-error: true

      - name: Run model training (v1 + v2 + v4 + v5 + v6 + v7 + v8)
        run: |
          python train_models.py --all
          python train_models.py --all --v2
          python train_models.py --all --v4
          python train_models.py --all --v5
          python train_models.py --all --v6
          python train_models.py --all --v7
          python train_models.py --all --v8

      - name: Run v9 training (named station features — skips if <30 rows have KJFK data)
        run: |
          python train_models.py --all --v9
        continue-on-error: true  # graceful skip until enough v9 rows are populated

      - name: Run v10 training (MANH 5-min Mesonet — skips if <30 rows have MANH data)
        run: |
          python train_models.py --all --v10
        continue-on-error: true  # graceful skip until enough v10 rows are populated

      - name: Show training results
        run: |
          for meta in model_metadata*.json lax_model_metadata*.json; do
            if [ -f "$meta" ]; then
              echo "=== $meta ==="
              cat "$meta"
              echo ""
            fi
          done
          echo "=== Model files ==="
          ls -lh *.pkl *model_metadata*.json 2>/dev/null || echo "No model files"

      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.pkl *model_metadata*.json *multiyear_atmospheric.csv \
                  *observation_data.csv *atmospheric_data.csv *high_timing_data.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "Retrain ML models v1–v8 (+v9/v10 if ready) $(date +%Y-%m-%d)

          Daily retrain: v1 v2 v4 v5 v6 v7 v8 + v9 (Synoptic stations) + v10 (MANH 5-min).
          v9: KJFK/KLGA/KEWR/KTEB temps, coastal-vs-inland gradient, JFK-KNYC diff.
          v10: MANH Manhattan Mesonet 5-min fill-in between KNYC hourly reports.
          v9/v10 training skipped automatically if not enough rows backfilled yet.
          See model_metadata*.json for updated accuracy metrics."
            git push
          fi
