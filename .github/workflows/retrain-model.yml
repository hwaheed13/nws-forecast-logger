name: Monthly ML Model Retrain

on:
  schedule:
    # 1st of every month at 6am ET (11am UTC)
    - cron: "0 11 1 * *"
  workflow_dispatch:  # manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.24.3 pandas scikit-learn==1.3.0

      - name: Run model training
        run: python train_models.py

      - name: Show training results
        run: |
          echo "=== Model Metadata ==="
          cat model_metadata.json
          echo ""
          echo "=== File sizes ==="
          ls -lh temp_model.pkl bucket_model.pkl model_metadata.json

      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add temp_model.pkl bucket_model.pkl model_metadata.json
          if git diff --cached --quiet; then
            echo "No model changes to commit"
          else
            git commit -m "Retrain ML models with latest data ($(date +%Y-%m-%d))

          Automated monthly retrain using train_models.py.
          See model_metadata.json for updated performance metrics."
            git push
          fi
